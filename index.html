<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="KurirTrack - Aplikasi tracking kurir motor real-time">
  <meta name="theme-color" content="#4e7cff">
  <title>KurirTrack - Login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .login-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .login-page::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(78, 124, 255, 0.15), transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .login-page::after {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.1), transparent 70%);
      bottom: -80px;
      left: -80px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(20px, -20px);
      }
    }

    .login-brand {
      text-align: center;
      margin-bottom: var(--space-2xl);
      position: relative;
      z-index: 1;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      background: var(--gradient-blue);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-md);
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      box-shadow: var(--shadow-glow-blue);
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .login-brand h1 {
      font-size: 1.75rem;
      background: linear-gradient(135deg, #fff, #9ca3b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--gradient-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      position: relative;
      z-index: 1;
    }

    .login-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: var(--space-lg);
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .login-tab.active {
      background: var(--accent-blue);
      color: white;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .register-fields {
      display: none;
    }

    .register-fields.show {
      display: contents;
    }

    .role-selector {
      display: flex;
      gap: var(--space-sm);
    }

    .role-option {
      flex: 1;
      padding: 12px;
      text-align: center;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .role-option.selected {
      border-color: var(--accent-blue);
      background: rgba(78, 124, 255, 0.1);
    }

    .role-option .role-icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .role-option .role-label {
      font-size: 0.8125rem;
      font-weight: 600;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--accent-red-light);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .demo-section {
      margin-top: var(--space-lg);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .demo-section p {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-bottom: var(--space-sm);
    }

    .demo-buttons {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
    }

    .demo-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .demo-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue-light);
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin: var(--space-md) 0;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-google:hover {
      background: #f5f5f5;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    /* Role modal for Google login */
    .role-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    .role-modal.show {
      display: flex;
    }

    .role-modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      max-width: 320px;
      width: 100%;
      text-align: center;
    }

    .role-modal-content h3 {
      margin-bottom: var(--space-md);
      color: var(--text-primary);
    }

    .role-modal-content p {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      margin-bottom: var(--space-lg);
    }

    .role-modal-buttons {
      display: flex;
      gap: var(--space-sm);
    }

    .role-modal-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      background: transparent;
      color: var(--text-primary);
    }

    .role-modal-btn:hover {
      border-color: var(--accent-blue);
      background: rgba(78, 124, 255, 0.1);
    }

    .role-modal-btn .role-icon {
      font-size: 2rem;
    }

    .role-modal-btn .role-label {
      font-size: 0.875rem;
      font-weight: 600;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="login-page">
    <div class="login-brand">
      <div class="login-logo">KT</div>
      <h1>KurirTrack</h1>
      <p>Tracking kurir motor real-time</p>
    </div>

    <div class="login-card">
      <div class="login-tabs">
        <div class="login-tab active" id="tab-login" onclick="switchTab('login')">Masuk</div>
        <div class="login-tab" id="tab-register" onclick="switchTab('register')">Daftar</div>
      </div>

      <div id="login-error" class="login-error"></div>

      <form class="login-form" id="auth-form" onsubmit="handleSubmit(event)">
        <div class="register-fields" id="register-fields">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="input-name" placeholder="Nama lengkap">
          </div>

          <div class="form-group">
            <label>Role</label>
            <div class="role-selector">
              <div class="role-option selected" id="role-owner" onclick="selectRole('owner')">
                <div class="role-icon">👔</div>
                <div class="role-label">Owner</div>
              </div>
              <div class="role-option" id="role-driver" onclick="selectRole('driver')">
                <div class="role-icon">🏍️</div>
                <div class="role-label">Driver</div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>No. HP</label>
            <input type="tel" id="input-phone" placeholder="08xxxxxxxxxx">
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="input-email" placeholder="email@contoh.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="input-password" placeholder="Minimal 6 karakter" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="auth-submit-btn" data-original-text="Masuk">
          Masuk
        </button>

        <div class="login-divider">atau</div>

        <button type="button" class="btn-google" onclick="handleGoogleLogin()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Masuk dengan Google
        </button>
      </form>
    </div>

    <div class="demo-section">
      <p>Atau coba tanpa akun</p>
      <div class="demo-buttons">
        <button class="demo-btn" onclick="demoLogin('owner')">🔍 Demo Owner</button>
        <button class="demo-btn" onclick="demoLogin('driver')">🏍️ Demo Driver</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    let currentTab = 'login';
    let selectedRole = 'owner';

    // Init Firebase
    if (isFirebaseConfigured()) {
      initFirebase();
      Auth.init();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('register-fields').classList.toggle('show', tab === 'register');
      document.getElementById('auth-submit-btn').textContent = tab === 'login' ? 'Masuk' : 'Daftar';
      document.getElementById('auth-submit-btn').dataset.originalText = tab === 'login' ? 'Masuk' : 'Daftar';
      hideError();
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('role-owner').classList.toggle('selected', role === 'owner');
      document.getElementById('role-driver').classList.toggle('selected', role === 'driver');
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('login-error').classList.remove('show');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideError();

      const email = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;

      if (!email || !password) {
        showError('Email dan password harus diisi');
        return;
      }

      if (currentTab === 'login') {
        const result = await Auth.login(email, password);
        if (!result.success) {
          showError(result.error);
        }
      } else {
        const name = document.getElementById('input-name').value.trim();
        const phone = document.getElementById('input-phone').value.trim();

        if (!name) {
          showError('Nama harus diisi');
          return;
        }

        const result = await Auth.register(email, password, name, selectedRole, phone);
        if (!result.success) {
          showError(result.error);
        }
      }
    }

    function demoLogin(role) {
      Auth.demoLogin(role);
    }

    async function handleGoogleLogin() {
      hideError();

      if (currentTab === 'register') {
        // Show role selector modal for registration
        document.getElementById('role-modal').classList.add('show');
        return;
      }

      // Direct login - role is already in Firestore
      const result = await Auth.loginWithGoogle();
      if (!result.success) {
        showError(result.error);
      }
    }

    async function googleLoginWithRole(role) {
      document.getElementById('role-modal').classList.remove('show');
      const result = await Auth.loginWithGoogle(role);
      if (!result.success) {
        showError(result.error);
      }
    }
  </script>

  <!-- Role Selection Modal (for first-time Google login) -->
  <div class="role-modal" id="role-modal">
    <div class="role-modal-content">
      <h3>Pilih Role Anda</h3>
      <p>Daftar sebagai apa?</p>
      <div class="role-modal-buttons">
        <button class="role-modal-btn" onclick="googleLoginWithRole('owner')">
          <div class="role-icon">👔</div>
          <div class="role-label">Owner</div>
        </button>
        <button class="role-modal-btn" onclick="googleLoginWithRole('driver')">
          <div class="role-icon">🏍️</div>
          <div class="role-label">Driver</div>
        </button>
      </div>
    </div>
  </div>
</body>

</html>
